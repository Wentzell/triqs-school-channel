{% set version = "4.0.0.school2026" %}

package:
  name: triqs_cthyb
  version: {{ version }}

source:
  # Summer-school 2026 pre-release snapshot (untagged). See CLAUDE.md.
  git_url: https://github.com/TRIQS/cthyb.git
  git_rev: 85466c825c684e5ee79d015fd383d16011040cdb

build:
  number: 0
  skip: true  # [win or py<30]
  # ccache: forward the launcher + cache-dir vars (set by build_one.sh when
  # CCACHE=1) through conda-build's env sanitization so CMake uses ccache and
  # writes to the CI-persisted cache. Unset vars (local non-ccache builds) are
  # harmlessly skipped.
  script_env:
    - CMAKE_C_COMPILER_LAUNCHER
    - CMAKE_CXX_COMPILER_LAUNCHER
    - CMAKE_Fortran_COMPILER_LAUNCHER
    - CCACHE_DIR
    - CCACHE_MAXSIZE

requirements:
  build:
    - python                                 # [build_platform != target_platform]
    - cross-python_{{ target_platform }}     # [build_platform != target_platform]
    - numpy                                  # [build_platform != target_platform]
    - cmake
    - make
    - {{ compiler('c') }}
    - {{ compiler('cxx') }}
    - {{ stdlib("c") }}
    - {{ mpi }}                              # [mpi == 'openmpi' and build_platform != target_platform]
  host:
    # 4.0 no longer uses nfft (deps are cpp2py + gtest only).
    - triqs =={{ version }}
    - libboost-devel
    - fftw
    - hdf5
    - {{ mpi }}
    - libblas
    - liblapack
    - numpy
    - python
  run:
    - {{ pin_compatible("triqs", max_pin="x.x") }}
    - fftw
    - hdf5
    - {{ mpi }}
    - libblas
    - liblapack
    - python

test:
  commands:
    - export OMPI_MCA_btl=self,tcp
    - export OMPI_MCA_plm=isolated
    - export OMPI_MCA_rmaps_base_oversubscribe=yes
    - export OMPI_MCA_btl_vader_single_copy_mechanism=none
    - export mpiexec="mpiexec --allow-run-as-root"
    - python -c "import triqs_cthyb"

about:
  home: https://triqs.github.io/cthyb
  license: GPL-3.0-or-later
  license_family: GPL
  license_file: LICENSE.txt
  summary: A fast and generic hybridization-expansion impurity solver

extra:
  recipe-maintainers:
    - wentzell
    - pgunn
    - thoemi09
